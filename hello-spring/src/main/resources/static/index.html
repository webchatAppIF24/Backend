<!DOCTYPE html>
<html>
<head>
  <title>WebSocket Test</title>
  <script src="https://cdn.jsdelivr.net/sockjs/1/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<h1>WebSocket Test</h1>
<input type="text" id="messageInput" placeholder="Enter message" />
<button onclick="sendMessage()">Send</button>

<ul id="messageList"></ul>

<script>
  var socket = new SockJS('/ws');
  var stompClient = Stomp.over(socket);

  stompClient.connect({}, function(frame) {
      console.log('Connected: ' + frame);
      stompClient.subscribe('/topic/posts', function(messageOutput) {
          var message = JSON.parse(messageOutput.body);
          var messageList = document.getElementById("messageList");
          var listItem = document.createElement("li");
          listItem.appendChild(document.createTextNode(message.content));
          messageList.appendChild(listItem);
      });
  });

  function sendMessage() {
      var messageInput = document.getElementById("messageInput");
      var message = { content: messageInput.value };
      stompClient.send("/app/post", {}, JSON.stringify(message));
  }
</script>
</body>
</html>
